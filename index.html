<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Duty Pharmacies 📅 26.04.2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; -webkit-font-smoothing: antialiased; }
    #map { height: 100%; width: 100%; }
    #panel{
      position:absolute;top:0;left:0;height:100%;width:360px;max-width:90vw;background:#fff;
      transform:translateX(-100%);transition:transform .26s ease-in-out,box-shadow .26s ease-in-out;
      z-index:1000;box-shadow:none;display:flex;flex-direction:column;
      border: 2px solid red; /* 🔴 Roter Rahmen */
    }
    #panel.open{ transform:translateX(0); box-shadow:0 10px 30px rgba(0,0,0,.18) }
    .panel-header{
      display:flex;align-items:center;justify-content:space-between;
      gap:8px;padding:16px 18px;border-bottom:1px solid #eee
    }
    .panel-header h2{ margin:0; font-size:18px; line-height:1.3 }
    .close-btn{
      appearance:none;border:0;background:#f2f2f2;border-radius:10px;
      width:40px;height:36px;display:inline-flex;align-items:center;justify-content:center;
      cursor:pointer;font-size:18px;line-height:1
    }
    .close-btn:active{ transform:translateY(1px) }
    .panel-body{ padding:14px 18px 22px 18px; overflow:auto }
    .row{ margin:10px 0; line-height:1.5; font-size:15px }
    .label{ display:inline-block; min-width:86px; color:#444; font-weight:600 }
    .value{ color:#111; word-break:break-word }
    .cta{ margin-top:12px; display:inline-block; text-decoration:none; padding:10px 14px; border-radius:10px; background:#111; color:#fff; font-weight:600; letter-spacing:.2px }
    @media (max-width:768px){
      #panel{ width:100%; max-width:100% }
      .panel-header{ padding:14px 16px }
      .close-btn{ width:44px; height:40px; font-size:20px }
      .panel-body{ padding:12px 16px 18px 16px }
      .row{ font-size:16px } .label{ min-width:84px }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- Slide-In Panel -->
  <aside id="panel" aria-hidden="true">
    <div class="panel-header">
      <h2>🏥 Pharmacies on duty 🏥</h2>
      <button id="panel-close" class="close-btn" aria-label="Close panel">✕</button>
    </div>
    <div class="panel-body">
      <div class="row">📅 <span class="label">Date</span> <span class="value" id="info-date">26.04.2026</span></div>
      <div class="row">🕒 <span class="label">Time</span> <span class="value" id="info-time">—</span></div>
      <div class="row">🏥 <span class="label">Name</span> <span class="value" id="info-name">—</span></div>
      <div class="row">📍 <span class="label">Address</span> <span class="value" id="info-address">—</span></div>
      <div class="row">☎️ <span class="label">Phone</span> <span class="value"><a id="info-phone" href="#" style="color:inherit;text-decoration:none;">—</a></span></div>
      <a id="info-nav" class="cta" href="#" target="_blank" rel="noopener">🧭 Navigate</a>
    </div>
  </aside>

  <script>
    const markers = [{"lat":35.1936174,"lng":33.3221956,"name":"GÜLNUR ECZANESİ","address":"N0:48 /B Kemal Şemiler Cad. Kalın Yol üzeri Güvenir Göz Hastanesi yanı Köseoğlu market sırası Metehan Lefkoşa","phone":"(0392) 223 66 30","time":"08:00 - 00:00"},{"lat":35.2126916,"lng":33.3763749,"name":"ÇINARLI ECZANESİ","address":"Güven Sok. 21 A Hamitköy (Ekin Adademir Yurtları arkası)","phone":"(0392) 225 23 60","time":"08:00 - 00:00"},{"lat":35.1867851,"lng":33.3568253,"name":"ŞERİFE ADEMOĞULLARI ECZANESİ","address":"Şht. İsmail Dümenci Sok No: 2C Yenişehir Lefkoşa Fenerium karşısındaki sokakta köşede,Eski İştah Restorant ve Kamusen Karşısı","phone":"(0392) 228 17 67","time":"08:00 - 00:00"},{"lat":35.3391989,"lng":33.2728331,"name":"İPEK YÖNEY ECZANESİ","address":"Karaoğlanoğlu Cad. Faraçoğlu İşhanı No: 320 Karaoğlanoğlu Girne","phone":"(0533) 862 76 56","time":"08:00 - 00:00"},{"lat":35.3322825,"lng":33.3195479,"name":"ÖZGE ÖZÇINAR ECZANESİ","address":"Mete Adanır Cad. Cyprus Pools Apt. N0:28 C Girne","phone":"(0392) 815 90 90","time":"08:00 - 00:00"},{"lat":35.3484825,"lng":33.2142441,"name":"SOYERLER ECZANESİ","address":"Karaoğlanoğlu Cad. Side Plaza No: 105, Dük. No: 2, İş Bankası yanı, Alsancak, Girne","phone":"(0533) 830 07 17","time":"08:00 - 00:00"},{"lat":35.131126,"lng":33.919354,"name":"HALKIN ECZANESİ","address":"2. Uluçam Yolu Erbatu Apt. Evleri B Blok, Dük.1, Pakduş ve Çocuk Dünyası yolu, Noterland Primer Park karşısı, Sakarya, Gazimağusa","phone":"(0392) 365 01 12","time":"08:00 - 00:00"},{"lat":35.1413459,"lng":33.9149104,"name":"REZAN ECZANESİ","address":"İsmet İnönü bulvarı Presidental Bulding Dük.N0:6 Gazimağusa","phone":"(0392) 365 69 11","time":"08:00 - 00:00"},{"lat":35.192481,"lng":32.9950105,"name":"İNCİ ECZANESİ","address":"Kutlu Adalı Bulvarı N0: 1K Terminal karşısı Güzelyurt","phone":"(0392) 714 32 52","time":"08:00 - 00:00"},{"lat":35.1718266,"lng":32.9226532,"name":"SIDIKA UMAR ECZANESİ","address":"Menekşe Sok. No: 2/B, Gaziveren, Lefke","phone":"(0392) 723 79 97","time":"08:00 - 22:00"},{"lat":35.2188755,"lng":33.4641805,"name":"YÜKSEL ECZANESİ","address":"Sevgi Sokak, Minareliköy Milli Homes 34 No: 4, Değirmenlik, Akıncılar, Lefkoşa","phone":"(0542) 875 21 12","time":"08:00 - 19:00"},{"lat":35.1595495,"lng":33.6056844,"name":"GÜNER BİNBOĞA ECZANESİ","address":"Atatürk Cad. No: 4, Paşaköy, Alt Mesarya, Gazimağusa","phone":"(0392) 236 91 00","time":"08:00 - 19:00"},{"lat":35.2818339,"lng":33.9224619,"name":"AVİCENNA ECZANESİ","address":"İskele Boğaz anayolu, Bereket Sokak, Petek pastanesi̇ yanı, İskele","phone":"(0542) 855 00 15","time":"08:00 - 22:00"},{"lat":35.4237773,"lng":34.0704301,"name":"MELEK İBRAHİM ECZANESİ","address":"Öztürk Cad. No: 10, Mehmetçik, İskele","phone":"(0392) 375 53 66","time":"08:00 - 20:00"},{"lat":35.5284412,"lng":34.1807929,"name":"KARPAZIN ECZANESİ","address":"Şht. Mustafa H. Akdeniz Sokak No: 4, Yenierenköy","phone":"(0539) 112 38 02","time":"08:00 - 00:00"}];
    window.markers = markers;

    const pharmacySVG = `<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64' viewBox='0 0 64 64'>
      <circle cx='32' cy='32' r='30' fill='#ffffff' stroke='#1e7e34' stroke-width='4'/>
      <rect x='28' y='16' width='8' height='32' fill='#1e7e34'/>
      <rect x='16' y='28' width='32' height='8' fill='#1e7e34'/>
    </svg>`;
    const pharmacyIconUrl = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(pharmacySVG);

    function showPanel(){
      const p=document.getElementById('panel');
      p.classList.add('open'); p.setAttribute('aria-hidden','false');
    }
    function hidePanel(){
      const p=document.getElementById('panel');
      p.classList.remove('open'); p.setAttribute('aria-hidden','true');
    }
    function updatePanel(d){
      document.getElementById('info-name').textContent = d.name || '—';
      document.getElementById('info-address').textContent = d.address || '—';
      const phoneElem = document.getElementById('info-phone');
      phoneElem.textContent = d.phone || '—';
      phoneElem.href = d.phone ? `tel:${d.phone.replace(/\s+/g,'')}` : '#';
      document.getElementById('info-time').textContent = d.time || '—';
      document.getElementById('info-nav').href = `https://www.google.com/maps?q=${d.lat},${d.lng}`;
    }

    document.addEventListener('click', (e)=>{
      if(e.target && e.target.id === 'panel-close'){ hidePanel(); }
    });

    function initMap(){
      const map = new google.maps.Map(document.getElementById('map'),{
        zoom: 9,
        center: { lat: 35.25, lng: 33.4 },
        mapTypeId: google.maps.MapTypeId.HYBRID
      });
      (window.markers || []).forEach((d)=>{
        const m = new google.maps.Marker({
          position:{lat:d.lat,lng:d.lng},
          map,
          title:d.name,
          icon:{
            url: pharmacyIconUrl,
            scaledSize: new google.maps.Size(34, 34),
            anchor: new google.maps.Point(17, 34)
          }
        });
        m.addListener('click', ()=>{
          updatePanel(d);
          showPanel();
          map.panTo({lat:d.lat,lng:d.lng});
        });
      });
    }
  </script>

  <script src="config.js?v=1777156549792"></script>
  <script>
    const mapsScript=document.createElement('script');
    mapsScript.src=`https://maps.googleapis.com/maps/api/js?key=${CONFIG.apiKey}&callback=initMap&cb=1777156549792`;
    mapsScript.async=true; mapsScript.defer=true;
    document.head.appendChild(mapsScript);
  </script>
</body>
</html>
